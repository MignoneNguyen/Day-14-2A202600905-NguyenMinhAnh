name: AI Evaluation Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        # Install other requirements if needed (e.g. deepeval, ragas, trulens_eval)
        # pip install -r requirements.txt
        
    - name: Run Pytest
      run: |
        pytest tests/ -v
        
    - name: Run Benchmark Script
      run: |
        python solution/solution.py
